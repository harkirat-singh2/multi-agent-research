<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Research System</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 950px;
        max-width: 95%;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 0 60px rgba(56, 189, 248, 0.2);
      }

      h1 {
        text-align: center;
        color: #38bdf8;
        margin-bottom: 20px;
      }

      .input-box {
        display: flex;
        gap: 10px;
      }

      input {
        flex: 1;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: #020617;
        color: white;
        font-size: 15px;
        outline: none;
      }

      button {
        padding: 14px 20px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        transform: scale(1.05);
      }

      .status {
        margin-top: 10px;
        font-size: 13px;
        color: #94a3b8;
        text-align: center;
      }

      .section {
        margin-top: 20px;
        padding: 15px;
        background: #020617;
        border-radius: 12px;
        max-height: 200px;
        overflow-y: auto;
      }

      .section h3 {
        margin-top: 0;
        color: #38bdf8;
      }

      .content {
        white-space: pre-wrap;
        line-height: 1.6;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🧠 Multi-Agent Research AI</h1>

      <div class="input-box">
        <input id="query" placeholder="Ask anything..." />
        <button onclick="runResearch()">Run</button>
      </div>

      <div id="status" class="status"></div>

      <div class="section">
        <h3>📄 Report</h3>
        <div id="report" class="content"></div>
      </div>

      <div class="section">
        <h3>🧠 Critique</h3>
        <div id="critique" class="content"></div>
      </div>

      <div class="section">
        <h3>🔗 Sources</h3>
        <div id="sources" class="content"></div>
      </div>
    </div>

    <script>
      async function runResearch() {
        const query = document.getElementById("query").value.trim();

        const reportEl = document.getElementById("report");
        const critiqueEl = document.getElementById("critique");
        const sourcesEl = document.getElementById("sources");
        const status = document.getElementById("status");

        if (!query) return;

        // Reset UI
        reportEl.innerHTML = "";
        critiqueEl.innerHTML = "";
        sourcesEl.innerHTML = "";
        status.innerHTML = "⏳ Agents are thinking...";

        try {
          const response = await fetch(
            `https://multi-agent-research-a9s2.onrender.com/research/stream?query=${encodeURIComponent(query)}`,
          );

          if (!response.ok) {
            throw new Error("Server error: " + response.status);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          let fullText = "";
          let lastLength = 0;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            fullText += chunk;

            // 🔥 SPLIT SECTIONS SAFELY (even if chunks break)
            let report = "";
            let critique = "";
            let sources = "";

            if (fullText.includes("=== CRITIQUE ===")) {
              const parts = fullText.split("=== CRITIQUE ===");
              report = parts[0];

              if (parts[1].includes("🔗 SOURCES")) {
                const subParts = parts[1].split("🔗 SOURCES");
                critique = subParts[0];
                sources = subParts[1];
              } else {
                critique = parts[1];
              }
            } else {
              report = fullText;
            }

            // 🔥 UPDATE UI
            reportEl.innerText = report;
            critiqueEl.innerText = critique;
            sourcesEl.innerText = sources;

            // Auto scroll
            reportEl.scrollTop = reportEl.scrollHeight;
          }

          status.innerHTML = "✅ Completed";
        } catch (err) {
          status.innerHTML = "❌ Error occurred";
          console.error(err);
        }
      }
    </script>
  </body>
</html>
